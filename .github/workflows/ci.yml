name: CI

on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t streamlit-app .
      - name: Add PyTest Lib
        run: pip install -r requirements.txt
      - name: Start Pytest
        run: pytest